<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Compliance — Starting Up</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=JetBrains+Mono&display=swap');
  :root { --accent: #10b981; --bg: #0a0f0d; --surface: #111318; --text: #e8eaed; --muted: rgba(232,234,237,0.4); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 50% 40% at 50% 30%, rgba(16,185,129,0.06), transparent),
      url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 0v40M0 20h40' stroke='%23ffffff' stroke-opacity='0.02' stroke-width='0.5'/%3E%3C/svg%3E");
  }
  .container { text-align: center; padding: 2rem; max-width: 400px; }
  .logo-mark {
    width: 56px; height: 56px; border-radius: 14px;
    background: rgba(16,185,129,0.1); border: 2px solid rgba(16,185,129,0.25);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem; animation: pulse-ring 3s ease-in-out infinite;
  }
  .logo-mark svg { width: 28px; height: 28px; fill: var(--accent); }
  @keyframes pulse-ring {
    0%,100% { border-color: rgba(16,185,129,0.25); box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    50% { border-color: rgba(16,185,129,0.5); box-shadow: 0 0 20px rgba(16,185,129,0.08); }
  }
  h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.35rem; letter-spacing: -0.02em; }
  .mono {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); opacity: 0.6; margin-bottom: 1.5rem;
  }
  p { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }

  .bar-loader { display: flex; gap: 3px; justify-content: center; margin: 1.5rem auto; }
  .bar-loader span {
    width: 3px; height: 16px; background: var(--accent); border-radius: 2px;
    animation: bar-bounce 1s ease-in-out infinite;
  }
  .bar-loader span:nth-child(2) { animation-delay: 0.1s; }
  .bar-loader span:nth-child(3) { animation-delay: 0.2s; }
  .bar-loader span:nth-child(4) { animation-delay: 0.3s; }
  .bar-loader span:nth-child(5) { animation-delay: 0.4s; }
  @keyframes bar-bounce {
    0%,80%,100% { transform: scaleY(0.4); opacity: 0.3; }
    40% { transform: scaleY(1); opacity: 1; }
  }

  .hint { font-size: 0.7rem; color: var(--muted); opacity: 0.5; margin-top: 2rem; }
  .retry {
    display: inline-block; margin-top: 1rem; padding: 0.45rem 1.5rem;
    background: transparent; color: var(--accent); border: 1px solid rgba(16,185,129,0.3);
    border-radius: 6px; cursor: pointer; font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .retry:hover { background: rgba(16,185,129,0.1); border-color: var(--accent); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .container > * { animation: fadeIn 0.5s ease-out both; }
  .container > :nth-child(2) { animation-delay: 0.1s; }
  .container > :nth-child(3) { animation-delay: 0.15s; }
  .container > :nth-child(4) { animation-delay: 0.2s; }
  .container > :nth-child(5) { animation-delay: 0.3s; }
</style>
</head>
<body>
<div class="container">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
  </div>
  <h1>MD Compliance</h1>
  <div class="mono">Starting Up</div>
  <div class="bar-loader"><span></span><span></span><span></span><span></span><span></span></div>
  <p>The application is initializing. This page refreshes automatically.</p>
  <button class="retry" onclick="location.reload()">Retry Now</button>
  <div class="hint">Masri Digital &mdash; masridigital.com</div>
</div>
<script>setTimeout(() => location.reload(), 5000);</script>
</body>
</html>
