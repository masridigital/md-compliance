[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E402",   # Module-level import not at top — needed for Flask patterns
    "F401",   # Imported but unused — many re-exports in __init__.py
    "W605",   # Invalid escape sequence — some regex in strings
]

[tool.ruff.lint.per-file-ignores]
"app/models.py" = ["E402", "F811"]
"app/__init__.py" = ["E402", "F401"]
"tests/*" = ["E402", "F401", "F811"]
