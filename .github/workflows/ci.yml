name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff bandit

      - name: Lint with ruff
        run: ruff check app/ --select E,F,W --ignore E501,E402,F401 --exit-zero

      - name: Security scan with bandit
        run: bandit -r app/ -ll -ii --exclude app/files -f json -o bandit-report.json || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax (all .py files)
        run: |
          find app/ -name "*.py" -exec python -c "
          import ast, sys
          try:
              ast.parse(open(sys.argv[1]).read())
          except SyntaxError as e:
              print(f'SYNTAX ERROR in {sys.argv[1]}: {e}')
              sys.exit(1)
          " {} \;

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: md_compliance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/md_compliance_test
      REDIS_URL: redis://localhost:6379/0
      FLASK_ENV: testing
      SECRET_KEY: test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --co -q 2>/dev/null || echo "No tests found yet — add tests in tests/ directory"
