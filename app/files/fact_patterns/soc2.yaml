rules:
  - control: "CC6.1"
    requirement_slot: "implementation_proof"
    fact_source: "microsoft"
    fact_subject: "mfa_enrollment"
    condition: "assertion.get('pct', 0) >= 95"
    evidence_name: "[Auto-Mapped] MFA Enrollment Validation"
    evidence_description: "Entra ID data confirms MFA enrollment is equal to or exceeds 95%."
    rationale: "SOC 2 CC6.1 requires logical access security including MFA."

  - control: "CC6.1"
    requirement_slot: "implementation_proof"
    fact_source: "microsoft"
    fact_subject: "conditional_access"
    condition: "assertion.get('enabled_policies', 0) > 0"
    evidence_name: "[Auto-Mapped] Conditional Access Validation"
    evidence_description: "Entra ID data confirms Conditional Access policies are enabled."
    rationale: "SOC 2 CC6.1 requires logical access security, enforced via Conditional Access."

  - control: "CC6.6"
    requirement_slot: "implementation_proof"
    fact_source: "ninjaone"
    fact_subject: "antivirus_status"
    condition: "assertion.get('av_active', 0) >= assertion.get('total_devices', 0) * 0.95 and assertion.get('total_devices', 0) > 0"
    evidence_name: "[Auto-Mapped] Antivirus Coverage Validation"
    evidence_description: "NinjaOne data confirms active endpoint protection on >= 95% of devices."
    rationale: "SOC 2 CC6.6 requires implementation of measures to protect against malicious software."

  - control: "CC7.1"
    requirement_slot: "implementation_proof"
    fact_source: "telivy"
    fact_subject: "external_scan"
    condition: "assertion.get('critical_high', 0) == 0 and assertion.get('total', 0) > 0"
    evidence_name: "[Auto-Mapped] Clean Vulnerability Scan"
    evidence_description: "Telivy external scan confirms zero critical or high vulnerabilities."
    rationale: "SOC 2 CC7.1 requires vulnerability scanning to detect configuration issues."
