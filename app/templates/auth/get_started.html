{% extends "layouts/basic.html" %}

{%block head%}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  .gs-panel { font-family: 'DM Sans', system-ui, sans-serif; }
  .gs-panel .input { background: rgba(255,255,255,0.05) !important; border-color: rgba(255,255,255,0.12) !important; color: #fff !important; }
  .gs-panel .input:focus { border-color: #10b981 !important; }
  .gs-bg {
    background: #0a0f0d;
    background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(16,185,129,0.10) 0%, transparent 60%);
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .anim-up { animation: fadeUp 0.5s ease-out both; }
  .anim-d1 { animation-delay: 0.15s; }
</style>
{%endblock%}

{%block body%}
<div x-data="standup()" class="gs-panel gs-bg min-h-screen flex items-center justify-center p-4" data-theme="dark">
  <div class="w-full max-w-sm bg-base-200 rounded-2xl shadow-2xl shadow-black/50 p-8 border border-emerald-500/10">

    <div class="anim-up text-center mb-6">
      <div class="w-12 h-12 rounded-xl bg-emerald-500/10 flex items-center justify-center mx-auto mb-4">
        <i class="ti ti-building text-emerald-400 text-2xl"></i>
      </div>
      <h2 class="text-xl font-bold text-white">Create Tenant</h2>
      <p class="text-sm text-gray-400 mt-1">Let's get started by setting up your organization</p>
    </div>

    <form action="{{url_for('auth.post_get_started')}}" method="POST" class="anim-up anim-d1">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-5">
        <label class="text-xs font-semibold uppercase tracking-wider text-gray-400 block mb-1.5">Organization Name</label>
        <input name="tenant" x-model="payload.tenant" type="text" class="input input-bordered w-full" placeholder="Acme Corp" />
      </div>
      <button :disabled="!readyToSubmit || isCreating" class="btn btn-primary w-full font-semibold">
        <i class="ti ti-rocket mr-1"></i> Get Started
      </button>
    </form>
  </div>
</div>
{%endblock%}

{%block extrajs%}
<script>
function standup(){
    return {
        init() {
          this.payload = {
            "tenant": this.getURLParam("tenant")
          }
          this.$watch(
            "payload", (newValue, oldValue) => {
              this.isReadyToSubmit(newValue)
          })
          this.isReadyToSubmit(this.payload)
        },
        payload: {},
        btnLoading: true,
        readyToSubmit:false,
        isCreating:false,
        getURLParam: function(param, defaultValue="") {
          var queryParams = new URLSearchParams(window.location.search);
          return queryParams.get(param) || defaultValue;
        },
        isReadyToSubmit: function(payload) {
            if (!payload.tenant) {
              this.readyToSubmit = false
              return
            }
            this.readyToSubmit = true
        }
    }
}
</script>
{%endblock%}
