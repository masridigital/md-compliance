{% extends "layouts/basic.html" %}

{%block head%}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  .reset-panel { font-family: 'DM Sans', system-ui, sans-serif; }
  .reset-mono { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
  .reset-panel .input { background: rgba(255,255,255,0.05) !important; border-color: rgba(255,255,255,0.12) !important; color: #fff !important; }
  .reset-panel .input:focus { border-color: #10b981 !important; }
  .reset-panel .input::placeholder { color: rgba(255,255,255,0.3); }
  .reset-hero {
    background: #0a0f0d;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(16,185,129,0.12) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h60v60H0z' fill='none'/%3E%3Cpath d='M30 0v60M0 30h60' stroke='%23ffffff' stroke-opacity='0.03' stroke-width='1'/%3E%3C/svg%3E");
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .anim-up { animation: fadeUp 0.5s ease-out both; }
  .anim-d1 { animation-delay: 0.1s; }
  .anim-d2 { animation-delay: 0.2s; }
  .anim-d3 { animation-delay: 0.3s; }
</style>
{%endblock%}

{%block body%}
<div x-data="reset()" class="min-h-screen reset-panel relative flex items-center justify-center" data-theme="dark">

  <!-- Full-screen hero background -->
  <div class="reset-hero fixed inset-0"></div>

  <!-- Reset card -->
  <div class="relative z-10 w-full max-w-sm mx-auto px-6">
    <div class="bg-[#16181d] border border-white/8 rounded-2xl p-8 shadow-2xl">

      <div class="anim-up anim-d1 mb-6 text-center">
        <div class="w-12 h-12 rounded-xl bg-emerald-500/10 flex items-center justify-center mx-auto mb-4">
          <i class="ti ti-lock-open text-emerald-400 text-2xl"></i>
        </div>
        <h2 class="text-xl font-bold text-white tracking-tight">Reset Password</h2>
        <p class="text-sm text-gray-400 mt-1">Enter your new password below</p>
      </div>

      <form action="{{url_for('auth.reset_password', token=token)}}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="anim-up anim-d2 mb-4">
          <label class="text-xs font-medium text-gray-400 block mb-1.5">New Password</label>
          <input x-model="payload.password" type="password" name="password" placeholder="Enter new password (12+ chars)" class="input input-sm w-full" autocomplete="new-password" required />
        </div>

        <div class="anim-up anim-d2 mb-4">
          <label class="text-xs font-medium text-gray-400 block mb-1.5">Confirm Password</label>
          <input x-model="payload.password2" type="password" name="password2" placeholder="Re-enter new password" class="input input-sm w-full" autocomplete="new-password" required />
          <p x-show="payload.password && payload.password !== payload.password2" class="mt-1.5 text-xs text-red-400">Passwords do not match.</p>
          <p x-show="payload.password && payload.password === payload.password2 && payload.password.length < 12" class="mt-1.5 text-xs text-red-400">Minimum 12 characters required.</p>
        </div>

        <div class="anim-up anim-d3 mt-6">
          <button :disabled="!readyToGo" class="btn btn-sm btn-block bg-emerald-500 hover:bg-emerald-600 text-white border-0">
            Reset Password
          </button>
        </div>
      </form>

      <div class="anim-up anim-d3 text-center mt-5">
        <a href="{{url_for('auth.get_login')}}" class="text-xs text-emerald-400 hover:underline">Back to sign in</a>
      </div>
    </div>
  </div>
</div>
{%endblock%}

{%block extrajs%}
<script>
function reset(){
    return {
        init() {
          this.$watch(
            "payload", (newValue, oldValue) => {
              this.isReadyToGo(newValue)
          })
        },
        payload: {
          password: null,
          password2: null
        },
        readyToGo: false,
        isReadyToGo: function(payload) {
            if (!payload.password || payload.password !== payload.password2) {
              this.readyToGo = false
              return
            }
            if (payload.password.length < 12) {
              this.readyToGo = false
              return
            }
            this.readyToGo = true
        }
    }
}
</script>
{%endblock%}
