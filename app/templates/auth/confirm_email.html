{% extends "layouts/basic.html" %}

{%block head%}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  .ce-panel { font-family: 'DM Sans', system-ui, sans-serif; }
  .ce-panel .input { background: rgba(255,255,255,0.05) !important; border-color: rgba(255,255,255,0.12) !important; color: #fff !important; }
  .ce-panel .input:focus { border-color: #10b981 !important; }
  .ce-bg {
    background: #0a0f0d;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(16,185,129,0.10) 0%, transparent 60%);
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .anim-up { animation: fadeUp 0.5s ease-out both; }
  .anim-d1 { animation-delay: 0.15s; }
</style>
{%endblock%}

{%block body%}
<div x-data="confirm()" class="ce-panel ce-bg min-h-screen flex items-center justify-center p-4" data-theme="dark">
  <div class="w-full max-w-md bg-base-200 rounded-2xl shadow-2xl shadow-black/50 p-8 border border-emerald-500/10">

    <!-- Email not configured -->
    <div x-show="!isEmailConfigured" class="anim-up text-center">
      <div class="w-12 h-12 rounded-xl bg-amber-500/10 flex items-center justify-center mx-auto mb-4">
        <i class="ti ti-mail-off text-amber-400 text-2xl"></i>
      </div>
      <h2 class="text-xl font-bold text-white mb-2">Email Not Configured</h2>
      <p class="text-sm text-gray-400 mb-5" x-text="'Contact ' + adminEmail + ' to enable email.'"></p>
      <a href="{{url_for('auth.logout')}}" class="btn btn-sm btn-primary w-full">Log Out</a>
    </div>

    <!-- Email configured -->
    <div x-show="isEmailConfigured" class="anim-up">
      <div class="text-center mb-6">
        <div class="w-12 h-12 rounded-xl bg-emerald-500/10 flex items-center justify-center mx-auto mb-4">
          <i class="ti ti-mail-check text-emerald-400 text-2xl"></i>
        </div>
        <h2 class="text-xl font-bold text-white">Confirm Your Email</h2>
        <p x-show="showSendEmailBtn" class="text-sm text-gray-400 mt-1">
          <span x-text="'Send a confirmation email to ' + currentEmail"></span>
        </p>
        <p x-show="!showSendEmailBtn" class="text-sm text-gray-400 mt-1">
          <span x-text="'Check your inbox at ' + currentEmail + ' (and spam)'"></span>
        </p>
      </div>

      <div class="anim-up anim-d1 space-y-3">
        <div class="flex gap-2">
          <input x-model="confirmationCode" placeholder="Enter code from email" class="input input-sm input-bordered flex-1"/>
          <button @click="checkConfirmationCode" :disabled="!confirmationCode" class="btn btn-sm btn-primary">Verify</button>
        </div>
        <button x-show="showSendEmailBtn" @click="resendConfirmationEmail;showSendEmailBtn=false" class="btn btn-sm btn-primary w-full">
          <i class="ti ti-send mr-1"></i> Send Email
        </button>
        <button x-show="!showSendEmailBtn" :disabled="!tryResend" @click="resendConfirmationEmail" class="btn btn-sm btn-outline w-full" style="border-color: rgba(255,255,255,0.15) !important; color: rgba(255,255,255,0.8) !important;">
          <i class="ti ti-refresh mr-1"></i> Resend Email
        </button>
      </div>

      <div class="mt-5 text-center">
        <a href="{{url_for('auth.logout')}}" class="text-sm text-gray-400 hover:text-emerald-400 transition-colors">
          <i class="ti ti-logout mr-1"></i> Log Out
        </a>
      </div>
      <div x-show="adminEmail.length>2" class="mt-3 text-center text-xs text-gray-500" x-text="'Issues? Contact ' + adminEmail"></div>
    </div>
  </div>
</div>
{%endblock%}

{%block extrajs%}
<script>
function confirm(){
    return {
        init() {
          this.confirmationCode = this.getURLParam("code")
        },
        adminEmail: "{{branding.support_email or config.HELP_EMAIL}}",
        tryResend: true,
        confirmationCode: "",
        isEmailConfigured: {{ "true" if email_configured else "false" }},
        showSendEmailBtn: true,
        currentEmail: "{{current_user.email}}",
        getURLParam: function(param, defaultValue="") {
          var queryParams = new URLSearchParams(window.location.search);
          return queryParams.get(param) || defaultValue;
        },
        resendConfirmationEmail: function() {
            request("POST",
                "/api/v1/users/{{current_user.id}}/send-confirmation",
                data => {
                    toast("Sent email. Check your inbox.")
                    this.tryResend = false
                },
                error => {
                  toast(error.message, "error");
                }
            );
            setTimeout(() => {
                this.tryResend = true;
            }, 30000);
        },
        checkConfirmationCode: function() {
            if (!this.confirmationCode) {
              toast("Enter confirmation code", "warning")
              return
            }
            payload = {
              "code": this.confirmationCode
            }
            request("POST",
                "/api/v1/users/{{current_user.id}}/verify-confirmation-code",
                data => {
                    toast("User confirmed. Redirecting to home.")
                    setTimeout(function() {
                        window.location.href = "/"
                    }, 2000);
                    this.tryResend = false
                },
                error => {
                  toast(error.message, "error");
                },
                payload
            );
            setTimeout(() => {
                this.tryResend = true;
            }, 30000);
        }
    }
}
</script>
{%endblock%}
