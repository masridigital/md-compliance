{% extends "layouts/basic.html" %}

{%block head%}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  .sp-panel { font-family: 'DM Sans', system-ui, sans-serif; }
  .sp-panel .input { background: rgba(255,255,255,0.05) !important; border-color: rgba(255,255,255,0.12) !important; color: #fff !important; }
  .sp-panel .input:focus { border-color: #10b981 !important; }
  .sp-bg {
    background: #0a0f0d;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(16,185,129,0.10) 0%, transparent 60%);
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .anim-up { animation: fadeUp 0.5s ease-out both; }
  .anim-d1 { animation-delay: 0.15s; }
  .anim-d2 { animation-delay: 0.3s; }
</style>
{%endblock%}

{%block body%}
<div x-data="setPassword()" class="sp-panel sp-bg min-h-screen flex items-center justify-center p-4" data-theme="dark">
  <div class="w-full max-w-md bg-base-200 rounded-2xl shadow-2xl shadow-black/50 p-8 border border-emerald-500/10">

    <div class="anim-up text-center mb-6">
      <div class="w-12 h-12 rounded-xl bg-emerald-500/10 flex items-center justify-center mx-auto mb-4">
        <i class="ti ti-lock text-emerald-400 text-2xl"></i>
      </div>
      <h2 class="text-xl font-bold text-white">Set Password</h2>
      <p class="text-sm text-gray-400 mt-1">Create a secure password to continue</p>
    </div>

    <div class="anim-up anim-d1 space-y-4">
      <div>
        <label class="text-xs font-semibold uppercase tracking-wider text-gray-400 block mb-1.5">Password</label>
        <input type="password" x-model="password" name="password" id="password" class="input input-bordered w-full" placeholder="Minimum 12 characters">
      </div>
      <div>
        <label class="text-xs font-semibold uppercase tracking-wider text-gray-400 block mb-1.5">Confirm Password</label>
        <input type="password" x-model="password2" name="password2" id="password2" class="input input-bordered w-full" placeholder="Repeat password">
      </div>
      <p x-show="password !== password2 && password2" class="text-xs text-red-400"><i class="ti ti-alert-circle mr-1"></i>Passwords do not match.</p>
      <p x-show="password === password2 && password && password.length < 12" class="text-xs text-amber-400"><i class="ti ti-alert-circle mr-1"></i>Minimum 12 characters required.</p>
    </div>

    <div class="anim-up anim-d2 mt-6">
      <button :class="{'btn-disabled opacity-40':!password || password !== password2 || password.length < 12}" @click="changePassword" class="btn btn-primary w-full font-semibold">
        <i class="ti ti-check mr-1"></i> Set Password
      </button>
    </div>
  </div>
</div>
{%endblock%}

{%block extrajs%}
<script>
function setPassword(){
    return {
        init() {},
        password: null,
        password2: null,
        changePassword: function() {
            let jsonData = {
                "password": this.password,
                "password2": this.password2
            }
            request("PUT",
                "/api/v1/users/{{current_user.id}}/password",
                data => {
                    toast("Updated password. Redirecting to home page.")
                    setTimeout(function() {
                        window.location.href = "/"
                    }, 1000);
                },
                error => {
                  toast(error.message, "error");
                },
                jsonData
            );
        }
    }
}
</script>
{%endblock%}
