services:

  # ── Application ─────────────────────────────────────────────────────────────
  app:
    container_name: app
    image: app
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db_nw
      - web_nw
    # Port 8000 is only exposed for direct access / development.
    # In production, nginx proxies to app:5000 internally.
    # Remove or comment this out once nginx is running.
    ports:
      - "8000:5000"
    restart: unless-stopped
    volumes:
      - app_uploads:/app/app/uploads
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}/${POSTGRES_DB}
      - RESET_DB=${RESET_DB:-no}
      - VERSION=${VERSION:-1.0.0}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - GUNICORN_WORKERS=2
      # --- Masri Compliance Platform ---
      - SECRET_KEY=${SECRET_KEY}
      - LLM_ENABLED=${LLM_ENABLED:-false}
      - LLM_NAME=${LLM_NAME:-}
      - LLM_TOKEN=${LLM_TOKEN:-}
      - MASRI_SCHEDULER_ENABLED=${MASRI_SCHEDULER_ENABLED:-true}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:-}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-}
      - APP_PRIMARY_COLOR=${APP_PRIMARY_COLOR:-#0066CC}
      - SUPPORT_EMAIL=${SUPPORT_EMAIL:-support@masridigital.com}
      - DOMAIN=${DOMAIN:-localhost}
    env_file:
      - .env

  # ── Database ─────────────────────────────────────────────────────────────────
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /data/postgres
    volumes:
      - postgres_data:/data/postgres
    # Expose postgres port for external DB tools (optional — remove in production)
    ports:
      - "5432:5432"
    networks:
      - db_nw
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Nginx (reverse proxy + SSL termination) ───────────────────────────────
  # Created and configured automatically by setup.sh.
  # Config lives in nginx/conf.d/mdcompliance.conf (generated per domain).
  nginx:
    container_name: nginx
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    networks:
      - web_nw
    restart: unless-stopped
    volumes:
      # Site config generated by setup.sh
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Let's Encrypt certificates (managed by certbot service)
      - ./nginx/ssl/letsencrypt:/etc/letsencrypt:ro
      # Certbot webroot for ACME challenges
      - ./nginx/certbot-webroot:/var/www/certbot:ro
    profiles:
      # nginx only starts when you explicitly opt in (setup.sh does this).
      # This prevents port conflicts on fresh installs before setup runs.
      - production

  # ── Certbot (SSL renewal) ─────────────────────────────────────────────────
  # Runs daily to check for and renew certificates.
  certbot:
    container_name: certbot
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./nginx/ssl/letsencrypt:/etc/letsencrypt
      - ./nginx/certbot-webroot:/var/www/certbot
    # Check for renewal every 12 hours (Let's Encrypt recommends this)
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet --webroot --webroot-path=/var/www/certbot; sleep 12h & wait $${!}; done"
    profiles:
      - production

networks:
  db_nw:
    driver: bridge
  web_nw:
    driver: bridge

volumes:
  # Database — survives restarts, rebuilds, and git pulls.
  # Wipe intentionally: docker-compose down -v
  postgres_data:
    driver: local
  # Uploaded evidence files
  app_uploads:
    driver: local
