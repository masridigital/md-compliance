services:
  app:
    container_name: app
    image: app
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db_nw
      - web_nw
    ports:
      - "8000:5000"
    restart: unless-stopped
    volumes:
      # Persist uploaded files across updates
      - app_uploads:/app/app/uploads
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}/${POSTGRES_DB}
      - RESET_DB=${RESET_DB:-no}
      - VERSION=${VERSION:-1.0.0}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - GUNICORN_WORKERS=2
      # --- Masri Compliance Platform ---
      - SECRET_KEY=${SECRET_KEY}
      - LLM_ENABLED=${LLM_ENABLED:-false}
      - LLM_NAME=${LLM_NAME:-}
      - LLM_TOKEN=${LLM_TOKEN:-}
      - MASRI_SCHEDULER_ENABLED=${MASRI_SCHEDULER_ENABLED:-true}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID:-}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET:-}
      - APP_PRIMARY_COLOR=${APP_PRIMARY_COLOR:-#0066CC}
      - SUPPORT_EMAIL=${SUPPORT_EMAIL:-support@masridigital.com}
    env_file:
      - .env

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /data/postgres
    volumes:
      # Named volume — data persists across `docker-compose down`, pulls, and rebuilds
      # To intentionally wipe: docker-compose down -v  (requires explicit flag)
      - postgres_data:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - db_nw
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  db_nw:
    driver: bridge
  web_nw:
    driver: bridge

volumes:
  # postgres_data: data survives restarts, updates, and rebuilds
  # To wipe intentionally: docker-compose down -v
  postgres_data:
    driver: local
  # app_uploads: user-uploaded evidence files
  app_uploads:
    driver: local
